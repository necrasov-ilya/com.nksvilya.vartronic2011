<html>
  <head>
    <meta charset="utf-8" />
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }

      input {
        padding: 10px;
      }

      button {
        padding: 12px 16px;
      }

      #error {
        color: #b00020;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <form id="gateway-form">
      <label>
        Gateway key
        <input id="gatewayKey" type="text" required value="default" />
      </label>
      <label>
        Host
        <input id="host" type="text" required placeholder="192.168.1.8" />
      </label>
      <label>
        Port
        <input id="port" type="number" min="1" max="65535" required value="502" />
      </label>
      <label>
        Start Modbus ID
        <input id="idStart" type="number" min="1" max="247" required value="16" />
      </label>
      <label>
        End Modbus ID
        <input id="idEnd" type="number" min="1" max="247" required value="23" />
      </label>
      <button type="submit">Scan devices</button>
      <div id="error"></div>
    </form>
    <script>
      const form = document.getElementById('gateway-form');
      const errorNode = document.getElementById('error');

      form.addEventListener('submit', async event => {
        event.preventDefault();
        errorNode.textContent = '';

        const payload = {
          gatewayKey: document.getElementById('gatewayKey').value.trim(),
          host: document.getElementById('host').value.trim(),
          port: Number(document.getElementById('port').value),
          idStart: Number(document.getElementById('idStart').value),
          idEnd: Number(document.getElementById('idEnd').value),
        };

        try {
          await Homey.emit('validate_gateway', payload);
          Homey.showView('list_devices');
        } catch (error) {
          errorNode.textContent = error && error.message ? error.message : 'Validation failed.';
        }
      });
    </script>
  </body>
</html>
