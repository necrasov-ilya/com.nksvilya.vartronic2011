<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
      }

      input {
        padding: 10px;
      }

      button {
        padding: 12px 16px;
      }

      #gatewayKey {
        background: #f3f4f6;
      }

      #error {
        color: #b00020;
        min-height: 20px;
      }
    </style>
  </head>
  <body>
    <form id="repair-form">
      <label>
        Gateway key
        <input id="gatewayKey" type="text" readonly />
      </label>
      <label>
        Host
        <input id="host" type="text" required />
      </label>
      <label>
        Port
        <input id="port" type="number" min="1" max="65535" required />
      </label>
      <label>
        Polling interval, seconds
        <input id="pollingIntervalSec" type="number" min="2" max="60" required />
      </label>
      <button type="submit">Update gateway</button>
      <div id="error"></div>
    </form>
    <script>
      const errorNode = document.getElementById('error');

      async function bootstrap() {
        try {
          const configuration = await Homey.emit('get_gateway_configuration');
          document.getElementById('gatewayKey').value = configuration.gatewayKey;
          document.getElementById('host').value = configuration.host;
          document.getElementById('port').value = configuration.port;
          document.getElementById('pollingIntervalSec').value = configuration.pollingIntervalSec;
        } catch (error) {
          errorNode.textContent = error && error.message ? error.message : 'Unable to load current settings.';
        }
      }

      document.getElementById('repair-form').addEventListener('submit', async event => {
        event.preventDefault();
        errorNode.textContent = '';

        const payload = {
          host: document.getElementById('host').value.trim(),
          port: Number(document.getElementById('port').value),
          pollingIntervalSec: Number(document.getElementById('pollingIntervalSec').value),
        };

        try {
          await Homey.emit('save_gateway_configuration', payload);
          Homey.done();
        } catch (error) {
          errorNode.textContent = error && error.message ? error.message : 'Unable to update gateway.';
        }
      });

      bootstrap();
    </script>
  </body>
</html>
